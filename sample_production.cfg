[general]
WORKING_DIR: ~/MoM/Processing
PRODUCT_DIR: ~/MoM/Products

[db]
DB_NAME: postgres                  # default PostgreSQL database
ADMIN_USER: mom_admin              # restricted app user (remote access)
ADMIN_PASSWORD: ???                # remote app user password
INTERNAL_READER_USER: mom_internal_reader  # read-only login user (remote access)
INTERNAL_READER_PASSWORD: ???      # internal reader password
DB_DATA_DIR: ~/MoM/postgres/data      # where PostgreSQL stores its data files

[cog]
COG_DIR: ~/MoM/cog_images
convert_to_cog: True

[processing_dir]
glofas: glofas
gfms: gfms
hwrf: hwrf
dfo: dfo
viirs: viirs
logs:logs

[products_dir]
GLOFAS: GLOFAS 
GFMS: GFMS
HWRF: HWRF
DFO: DFO
VIIRS: VIIRS
FINAL: Final_Alert  

[glofas]
